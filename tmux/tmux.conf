# tmux-ticket-layout — full tmux config
# TPM: ~/.tmux/plugins/tpm — first time inside tmux press: prefix + I (Shift-I)

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix (C-a)
set -g prefix C-a
unbind-key -n C-b
unbind-key C-b
bind-key C-a send-prefix

# Index from 1 (windows + panes); keep window numbers dense after closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Session / history / clipboard
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g set-clipboard on

# Status bar at top
set -g status-position top

# Mouse
set -g mouse on

# Pane borders
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Intuitive splits (inherit current path)
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Reload config
bind-key r source-file ~/.tmux.conf \; display "reloaded ~/.tmux.conf"

# Ticket session launcher — prefix + W, prompts for ticket ID
bind-key W command-prompt -p "Ticket:" "run-shell 'bash #{HOME}/.config/tmux/launch-layout.sh %%'"

# fzf-url picker (plugin: wfxr/tmux-fzf-url)
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'wfxr/tmux-fzf-url'

# Session persistence
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Catppuccin Mocha theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# Status bar modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

if-shell 'test -r ~/.tmux/plugins/tpm/tpm' "run '~/.tmux/plugins/tpm/tpm'"

# Force prefix back to C-a after plugins load (some plugins reset bindings)
set -g prefix C-a
unbind-key -n C-b
unbind-key C-b
bind-key C-a send-prefix

# Copy to system clipboard on mouse drag (macOS: pbcopy; Linux: xclip/xsel)
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -n MouseDragEnd1Pane copy-pipe-no-clear "pbcopy"'
if-shell 'command -v xclip >/dev/null 2>&1' \
  'bind-key -n MouseDragEnd1Pane copy-pipe-no-clear "xclip -in -selection clipboard"'
if-shell 'command -v xsel >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1' \
  'bind-key -n MouseDragEnd1Pane copy-pipe-no-clear "xsel --clipboard --input"'
